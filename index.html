<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LAVA HYD Device Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b; --card:#111c33; --line:#233150;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(135deg,#0f172a 0%,#111c33 60%,#0b1220 100%);
    color:var(--txt);min-height:100vh;}
  header{padding:28px 32px 8px;}
  .title{font-size:30px;font-weight:800;letter-spacing:.3px;
    background:linear-gradient(90deg,#38bdf8,#818cf8,#f472b6);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);margin-top:6px;font-size:13px;}
  .wrap{padding:16px 32px 48px;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin:18px 0 26px;}
  .kpi{border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;
    background:var(--card);border:1px solid var(--line);box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .kpi .n{font-size:34px;font-weight:800;line-height:1;}
  .kpi .l{color:var(--muted);margin-top:8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:6px;}
  .k1 .bar{background:#38bdf8}.k2 .bar{background:#a78bfa}.k3 .bar{background:#34d399}.k4 .bar{background:#fbbf24}
  .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;margin-bottom:26px;}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .panel h2{margin:0 0 12px;font-size:16px;font-weight:700;}
  .tabs{display:flex;gap:8px;margin:8px 0 14px;}
  .tab{padding:8px 16px;border-radius:999px;border:1px solid var(--line);cursor:pointer;
    background:transparent;color:var(--muted);font-weight:600;font-size:13px;}
  .tab.active{background:linear-gradient(90deg,#38bdf8,#6366f1);color:#fff;border-color:transparent;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  input[type=search]{flex:1;min-width:220px;background:#0b1220;border:1px solid var(--line);
    color:var(--txt);padding:10px 14px;border-radius:10px;font-size:14px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.5px;cursor:pointer;position:sticky;top:0;background:var(--card);}
  tbody tr:hover{background:#16223d;}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;color:#0b1220;}
  code{background:#0b1220;padding:2px 6px;border-radius:6px;font-size:12px;color:#7dd3fc;}
  .tablewrap{max-height:520px;overflow:auto;border-radius:10px;}
  footer{color:var(--muted);font-size:12px;padding:0 32px 30px;}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .legend span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
</style>
</head>
<body>
<header>
  <div class="title">LAVA HYD Lab — Device Dashboard</div>
  <div class="sub" id="sub"></div>
</header>
<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="grid">
    <div class="panel"><h2>Devices by Type</h2><canvas id="typeChart" height="230"></canvas><div class="legend" id="legend"></div></div>
    <div class="panel"><h2>Devices per Worker</h2><canvas id="workerChart" height="230"></canvas></div>
  </div>
  <div class="panel">
    <div class="tabs" id="tabs"></div>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Filter by worker, device, type or banner…" />
      <span class="sub" id="count"></span>
    </div>
    <div class="tablewrap">
      <table id="tbl">
        <thead><tr>
          <th data-k="worker">Worker</th><th data-k="device">Device</th>
          <th data-k="type">Type</th><th data-k="banner">Banner</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<footer id="foot"></footer>

const PALETTE = ["#38bdf8","#a78bfa","#34d399","#fbbf24","#f472b6","#f87171",
  "#22d3ee","#c084fc","#4ade80","#facc15","#fb923c","#60a5fa","#e879f9"];
const groupKeys = Object.keys(DATA.groups);
let current = groupKeys[0];
let sortKey = "worker", sortDir = 1;

document.getElementById("sub").textContent =
  "Source: " + DATA.source + "  •  Generated " + DATA.generated;
document.getElementById("foot").textContent =
  "Auto-generated from ser2net.yaml worker configs. " + DATA.source;

function colorFor(type, idx){ return PALETTE[idx % PALETTE.length]; }

function renderKpis(){
  const g = DATA.groups[current].summary;
  const totalDev = groupKeys.reduce((a,k)=>a+DATA.groups[k].summary.devices,0);
  const totalWk = groupKeys.reduce((a,k)=>a+DATA.groups[k].summary.workers,0);
  const kpis = [
    ["k1", g.devices, current + " devices"],
    ["k2", g.workers, current + " workers"],
    ["k3", Object.keys(g.types).length, "device types"],
    ["k4", totalDev + " / " + totalWk, "total devices / workers"],
  ];
  document.getElementById("kpis").innerHTML = kpis.map(k=>
    `<div class="kpi ${k[0]}"><div class="bar"></div><div class="n">${k[1]}</div><div class="l">${k[2]}</div></div>`
  ).join("");
}

let typeChart, workerChart;
function renderCharts(){
  const g = DATA.groups[current];
  const types = g.summary.types;
  const tLabels = Object.keys(types), tVals = Object.values(types);
  const tColors = tLabels.map((_,i)=>colorFor(_,i));
  if(typeChart) typeChart.destroy();
  typeChart = new Chart(document.getElementById("typeChart"), {
    type:"doughnut",
    data:{labels:tLabels,datasets:[{data:tVals,backgroundColor:tColors,borderColor:"#0b1220",borderWidth:2}]},
    options:{plugins:{legend:{display:false}},cutout:"58%"}
  });
  document.getElementById("legend").innerHTML = tLabels.map((l,i)=>
    `<span><span class="dot" style="background:${tColors[i]}"></span>${l} (${tVals[i]})</span>`).join("");

  const perWorker = {};
  g.rows.forEach(r=>{ perWorker[r.worker]=(perWorker[r.worker]||0)+1; });
  const wLabels = Object.keys(perWorker), wVals = Object.values(perWorker);
  if(workerChart) workerChart.destroy();
  workerChart = new Chart(document.getElementById("workerChart"), {
    type:"bar",
    data:{labels:wLabels,datasets:[{data:wVals,backgroundColor:wLabels.map((_,i)=>colorFor(_,i)),borderRadius:6}]},
    options:{plugins:{legend:{display:false}},scales:{
      x:{ticks:{color:"#94a3b8",maxRotation:90,minRotation:45,font:{size:9}},grid:{display:false}},
      y:{ticks:{color:"#94a3b8",stepSize:1},grid:{color:"#233150"}}}}
  });
}

function typeColorMap(){
  const g = DATA.groups[current];
  const labels = Object.keys(g.summary.types);
  const map={}; labels.forEach((l,i)=>map[l]=colorFor(l,i)); return map;
}

function renderTable(){
  const g = DATA.groups[current];
  const q = document.getElementById("search").value.toLowerCase();
  const cmap = typeColorMap();
  let rows = g.rows.filter(r=>
    [r.worker,r.device,r.type,r.banner].join(" ").toLowerCase().includes(q));
  rows.sort((a,b)=>{
    const x=(a[sortKey]||"").toString().toLowerCase(), y=(b[sortKey]||"").toString().toLowerCase();
    return x<y?-sortDir:x>y?sortDir:0;
  });
  document.getElementById("tbody").innerHTML = rows.map(r=>
    `<tr><td>${r.worker}</td><td>${r.device}</td>
     <td><span class="pill" style="background:${cmap[r.type]||'#64748b'}">${r.type}</span></td>
     <td>${r.banner}</td></tr>`).join("");
  document.getElementById("count").textContent = rows.length + " rows";
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = groupKeys.map(k=>
    `<button class="tab ${k===current?'active':''}" data-g="${k}">${k}</button>`).join("");
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
    current=b.dataset.g; renderAll();
  });
}

function renderAll(){ renderTabs(); renderKpis(); renderCharts(); renderTable(); }

document.getElementById("search").addEventListener("input", renderTable);
document.querySelectorAll("#tbl th").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; sortDir = (k===sortKey)? -sortDir : 1; sortKey=k; renderTable();
});
renderAll();
</script>
</body>
</html>
